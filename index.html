<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Doküman Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --user-bubble: #3730a3;
            --ai-bubble: rgba(30, 41, 59, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a, transparent 40%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            margin: 20px;
        }

        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.5);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .chat-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Scrollbar Styling */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(55, 48, 163, 0.3);
        }

        .message.ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        /* Sources Styles */
        .sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .source-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .input-area {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            background: rgba(30, 41, 59, 0.8);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: border-color 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            padding: 10px 15px;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Error Text */
        .error-text {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <div class="header-title">
                <div class="status-dot"></div>
                RAG_T3 AI Asistanı
            </div>
            <div style="color: var(--text-secondary); font-size: 0.9rem;">Yapay Zeka Hazır</div>
        </div>

        <div class="chat-area" id="chatbox">
            <div class="message ai">
                Merhaba! Yüklediğiniz belgeler üzerinden bana istediğiniz soruyu sorabilirsiniz. Size nasıl yardımcı olabilirim? 
            </div>
        </div>

        <div class="input-area">
            <form id="chat-form" class="input-wrapper">
                <input type="text" id="user-input" placeholder="Dokümanlar hakkında bir soru sorun..." autocomplete="off" required>
                <button type="submit" id="send-btn">Gönder</button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatbox = document.getElementById('chatbox');
        const sendBtn = document.getElementById('send-btn');

        // Scroll to bottom helper
        function scrollToBottom() {
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        // Add message to UI
        function addMessage(content, sender, sources = []) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            // Basic markdown handling (bold and line breaks)
            let formattedContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            div.innerHTML = formattedContent;

            // Append sources if available (only for AI)
            if (sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources';
                sourcesDiv.innerHTML = '<strong>Kaynaklar:</strong> ';
                
                sources.forEach(src => {
                    const tag = document.createElement('span');
                    tag.className = 'source-tag';
                    tag.innerText = src;
                    sourcesDiv.appendChild(tag);
                });
                
                div.appendChild(sourcesDiv);
            }

            chatbox.appendChild(div);
            scrollToBottom();
            return div;
        }

        // Add typing indicator
        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 5px;">Belgeler taranıyor ve düşünülüyor...</div>
            `;
            chatbox.appendChild(div);
            scrollToBottom();
            return div;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // Disable/Enable input
        function setInputState(disabled) {
            userInput.disabled = disabled;
            sendBtn.disabled = disabled;
            if (!disabled) userInput.focus();
        }

        // Poll the result endpoint
        async function pollResult(taskId) {
            try {
                const response = await fetch(`/result/${taskId}`);
                const data = await response.json();

                if (response.status === 404) {
                    throw new Error("Görev bulunamadı.");
                }

                if (data.status === 'completed') {
                    removeTypingIndicator();
                    addMessage(data.result.answer, 'ai', data.result.sources);
                    setInputState(false);
                } 
                else if (data.status === 'failed') {
                    removeTypingIndicator();
                    addMessage(`❌ Bir hata oluştu: ${data.error}`, 'ai');
                    setInputState(false);
                } 
                else {
                    // Still processing/pending, check again in 2 seconds
                    setTimeout(() => pollResult(taskId), 2000);
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage(`❌ Bağlantı hatası: ${error.message}. Lütfen sayfayı yenileyip tekrar deneyin.`, 'ai');
                setInputState(false);
            }
        }

        // Handle form submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Add User Message
            addMessage(text, 'user');
            userInput.value = '';
            setInputState(true);

            // 2. Show Typing
            showTypingIndicator();

            try {
                // 3. Send to /ask API
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });

                if (!response.ok) {
                    throw new Error("Sunucu yanıt vermedi");
                }

                const data = await response.json();
                
                // 4. Start polling with task_id
                pollResult(data.task_id);

            } catch (error) {
                removeTypingIndicator();
                addMessage(`❌ İstek gönderilemedi: ${error.message}`, 'ai');
                setInputState(false);
            }
        });
    </script>
</body>
</html>
